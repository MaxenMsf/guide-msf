<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ère d'Apocalypse</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/era_apocalypse.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="scripts/script.js"></script>
</head>
<body>
    <div id="header-container"></div>
    <video class="banner-apocalypse" src="images/age_annihilus.mp4" autoplay loop muted playsinline></video>
    <div class="info">
        Annhilus est la récompense de la 9ème dark dimension. Mais les 3 membres du conseil galatique se débloquent dans les 3 premiers chapitres de sa saga. Pour les débloquers leurs 7 étoile rouge je vous conseil :
        <div class="portraits-container">
            <img src="portrait/Portrait_Quasar.png" alt="Quasar">
            <img src="portrait/Portrait_Blastaar.png" alt="Blastaar">
            <img src="portrait/Portrait_Thunderstrike.png" alt="Thunderstrike">
        </div>

        <div class="chapters-container">
            <div class="portraits-container chapter-box">
                <h3>Chapitre 1</h3>
                <div class="characters chapter-portraits">
                    <img src="portrait/Portrait_FranklinRichards.png" alt="Franklin Richards">
                    <img src="portrait/Portrait_InvisibleWomanMCU.png" alt="Invisible Woman">
                    <img src="portrait/Portrait_MrFantasticMCU.png" alt="Professeur X">
                    <img src="portrait/Portrait_Quasar.png" alt="Professeur X">
                    <img src="portrait/Portrait_HumanTorch.png" alt="Professeur X">
                </div>
            </div>

            <div class="portraits-container chapter-box">
                <h3>Chapitre 2</h3>
                <div class="characters chapter-portraits">
                    <img src="portrait/Portrait_FranklinRichards.png" alt="Franklin Richards">
                    <img src="portrait/Portrait_InvisibleWomanMCU.png" alt="Invisible Woman">
                    <img src="portrait/Portrait_MrFantasticMCU.png" alt="Fantastic MCU X">
                    <img src="portrait/Portrait_DaimonHellstrom.png" alt="Professeur X">
                    <img src="portrait/Portrait_Vulture.png" alt="Professeur X">
                </div>
            </div>

            <div class="portraits-container chapter-box">
                <h3>Chapitre 3</h3>
                <div class="characters chapter-portraits">
                    <img src="portrait/Portrait_Xavier.png" alt="Professeur X">
                    <img src="portrait/Portrait_Xavier.png" alt="Professeur X">
                    <img src="portrait/Portrait_Xavier.png" alt="Professeur X">
                    <img src="portrait/Portrait_Xavier.png" alt="Professeur X">
                    <img src="portrait/Portrait_Xavier.png" alt="Professeur X">
                </div>
            </div>
        </div>
    </div>
    <div id="footer-container" style="margin-top: auto;"></div>
